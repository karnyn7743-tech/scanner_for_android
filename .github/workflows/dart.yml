# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Flutter Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # إعداد بيئة فلاتر الكاملة بدلاً من دارت لحل مشكلة عدم التعرف على الـ SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # استخدام النسخة المستقرة من فلاتر

      # استخدام أمر فلاتر الصحيح لتحميل حزم ومكتبات المشروع
      - name: Install dependencies
        run: flutter pub get

      # فحص وتحليل الكود برمجياً للتأكد من خلوه من الأخطاء والتحذيرات
      - name: Analyze project source
        run: flutter analyze

      # تشغيل اختبارات فلاتر (إذا كانت متوفرة في مشروعك)
      - name: Run tests
        run: flutter test
